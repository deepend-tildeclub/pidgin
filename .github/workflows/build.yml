name: build

on:
  push:
  pull_request:

jobs:
  build-all-protocols:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            gettext \
            intltool \
            libavahi-client-dev \
            libavahi-glib-dev \
            libdbus-1-dev \
            libglib2.0-dev \
            libidn11-dev \
            libkrb5-dev \
            libmeanwhile-dev \
            libxml2-dev \
            libzephyr-dev \
            libtool \
            pkg-config

      - name: Configure
        run: |
          ./configure \
            --disable-gtkui \
            --disable-consoleui \
            --disable-perl \
            --disable-tcl \
            --disable-tk \
            --disable-dbus \
            --disable-nm \
            --disable-vv \
            --disable-gstreamer \
            --with-dynamic-prpls=all

      - name: Build
        run: make -j"$(nproc)"
